name: Rest Api

on:
  push:
    paths:
      - 'rest_api/**'
      - '.github/workflows/rest-api.yml'
      - '.github/actions/**'
  pull_request:
    paths:
      - 'rest_api/**'
      - '.github/workflows/rest-api.yml'
      - '.github/actions/**'
  workflow_dispatch:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Ruff
        uses: ./.github/actions/ruff-check
        with:
          project-dir: rest_api

  ty:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: ./.github/actions/setup-python
        with:
          project-dir: rest_api

      - name: Run Ty
        uses: ./.github/actions/ty-check
        with:
          project-dir: rest_api
