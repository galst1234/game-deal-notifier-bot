repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
  - repo: local
    hooks:
      - id: ty-rest-api
        name: ty (rest_api)
        entry: bash -c 'cd rest_api && uv run ty check .'
        language: system
        pass_filenames: false
        files: "^rest_api/.*\\.py$"
        exclude: ".*/migrations/.*"
        types: [python]
      - id: ty-telegram-bot
        name: ty (telegram_bot)
        entry: bash -c 'cd telegram_bot && uv run ty check .'
        language: system
        pass_filenames: false
        files: "^telegram_bot/.*\\.py$"
        types: [python]
